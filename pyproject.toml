[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["plugins"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 25

[tool.mypy]
python_version = "3.11"
files = ["scripts"]
check_untyped_defs = true
ignore_missing_imports = true
explicit_package_bases = true
show_error_codes = true

[tool.coverage.run]
branch = true
source = ["scripts", "evals"]

[tool.coverage.report]
fail_under = 60
show_missing = true
skip_covered = true
omit = ["*/tests/*"]
