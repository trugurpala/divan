name: nobet
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 1 * *'  # her ayin 1'i 05:00 UTC
permissions:
  issues: write
  contents: read
jobs:
  upstream-nobet:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - id: nobet
        run: |
          set +e
          python scripts/upstream-denetim.py > rapor.txt 2>&1
          kod=$?
          set -e
          case "$kod" in
            0) echo "durum=yok" >> "$GITHUB_OUTPUT" ;;
            2) echo "durum=var" >> "$GITHUB_OUTPUT" ;;
            *) echo "durum=hata" >> "$GITHUB_OUTPUT" ;;
          esac
          cat rapor.txt
      - if: steps.nobet.outputs.durum == 'var'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const fs = require('fs');
            const rapor = fs.readFileSync('rapor.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Nöbet raporu: upstream değişimi tespit edildi',
              body: 'Aylık nöbet upstream farkları buldu. Kürasyon kararı bekliyor:\n\n```\n' + rapor + '\n```',
              labels: ['nobet']
            });
      - if: steps.nobet.outputs.durum == 'hata'
        run: |
          echo "Upstream denetimi calistirilamadi; rapor yukarida." >&2
          exit 1
