name: memory-diagnostic
on: [push, pull_request]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - name: Install Python quality dependencies
        run: pip install -r requirements-dev.txt
      - name: Hygiene
        run: python scripts/hygiene.py --check
      - name: Naming
        run: python scripts/naming.py --check
      - name: Company OS
        run: python scripts/divan.py company-validate
      - name: Standards
        run: python scripts/standards.py --check
      - name: Complete unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: General validator
        run: python scripts/validate.py
      - name: Evals
        run: python evals/run.py --check
      - name: Wiki
        run: python scripts/wiki.py --check
      - name: Candidate review
        run: python scripts/candidate_review.py --check
      - name: Catalog
        run: python scripts/catalog.py --check
      - name: V1 gates
        run: python scripts/v1.py --check
      - name: Release gates
        run: python scripts/release.py --check
      - name: Ruff
        run: ruff check .
      - name: Clean Code
        run: python scripts/clean_code.py --check
      - name: Mypy
        run: mypy scripts evals
      - name: Coverage
        run: |
          coverage run -m unittest discover -s tests
          coverage report --fail-under=64
      - name: Actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.10
          "$(go env GOPATH)/bin/actionlint"
      - name: Agent Skills validator
        run: |
          pip install skills-ref==0.1.1
          for skill in plugins/*/skills/*; do agentskills validate "$skill"; done
      - name: Claude Code validator
        run: |
          npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate . --strict
          for plugin in plugins/*; do npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate "$plugin" --strict; done
