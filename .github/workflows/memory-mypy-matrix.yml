name: memory-mypy-matrix
on: [push, pull_request]
permissions:
  contents: read
jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file:
          - scripts/divan.py
          - scripts/project_memory.py
          - scripts/project_memory_store.py
          - scripts/project_memory_validation.py
          - scripts/project_memory_workflow.py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - run: pip install mypy==2.3.0
      - run: mypy "${{ matrix.file }}" --show-error-codes
