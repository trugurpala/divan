name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'release-manifest.json'
      - 'scripts/release.py'
      - 'scripts/sbom.py'
      - 'scripts/build_project_runner.py'
      - 'plugins/sadrazam/company/**'
      - '.github/actions/divan-project/action.yml'
      - '.github/workflows/release.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  codex-clean-host:
    name: Release kapısı / Codex ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Unix kur-keşfet-kaldır
        if: runner.os != 'Windows'
        env:
          DIVAN_SOURCE_DIR: ${{ github.workspace }}
          CODEX_SKILLS_DIR: ${{ runner.temp }}/codex-skills
          DIVAN_STATE_DIR: ${{ runner.temp }}/codex-state
        run: |
          bash scripts/install_codex.sh
          test "$(find "$CODEX_SKILLS_DIR" -type f -name SKILL.md | wc -l)" -eq 41
          bash scripts/uninstall_codex.sh
          test "$(find "$CODEX_SKILLS_DIR" -type f -name SKILL.md | wc -l)" -eq 0
      - name: Windows kur-keşfet-kaldır
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DIVAN_SOURCE_DIR: ${{ github.workspace }}
          CODEX_SKILLS_DIR: ${{ runner.temp }}\codex-skills
          DIVAN_STATE_DIR: ${{ runner.temp }}\codex-state
        run: |
          & ./scripts/install_codex.ps1
          if (@(Get-ChildItem $env:CODEX_SKILLS_DIR -Filter SKILL.md -Recurse).Count -ne 41) { throw "41 skill bulunamadi" }
          & ./scripts/uninstall_codex.ps1
          if (@(Get-ChildItem $env:CODEX_SKILLS_DIR -Filter SKILL.md -Recurse).Count -ne 0) { throw "Kaldirma tamamlanmadi" }

  publish:
    needs: codex-clean-host
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production-release
    timeout-minutes: 25
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - name: Bütün yerel yayın kapıları
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
          python scripts/validate.py
          python scripts/release.py --check
          python scripts/v1.py --check
          python evals/run.py --check
          python scripts/wiki.py --check
          python scripts/candidate_review.py --check
          python scripts/catalog.py --check
      - name: Resmî şema doğrulayıcıları
        run: |
          pip install skills-ref==0.1.1
          for skill in plugins/*/skills/*; do agentskills validate "$skill"; done
          npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate . --strict
          for plugin in plugins/*; do npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate "$plugin" --strict; done
      - name: Pages ve Wiki aynı sürüme gelene kadar bekle
        run: |
          python - <<'PY'
          import pathlib, time, urllib.request

          version = pathlib.Path("VERSION").read_text().strip()
          surfaces = {
              "Pages": ("https://trugurpala.github.io/divan/", [f"v{version}", "Fermanını seç"]),
              "Wiki": ("https://raw.githubusercontent.com/wiki/trugurpala/divan/Home.md", [f"v{version}", "Fermanını seç"]),
          }
          pending = dict(surfaces)
          for _ in range(30):
              for name, (url, markers) in list(pending.items()):
                  try:
                      request = urllib.request.Request(url, headers={"Cache-Control": "no-cache"})
                      text = urllib.request.urlopen(request, timeout=15).read().decode("utf-8")
                      if all(marker in text for marker in markers):
                          print(f"{name} v{version} canlı.")
                          del pending[name]
                  except OSError:
                      pass
              if not pending:
                  break
              time.sleep(10)
          if pending:
              raise SystemExit("Canlı yayın yüzeyi zamanında güncellenmedi: " + ", ".join(pending))
          PY
      - name: Canlı Pages etkileşimini Chromium ile doğrula
        run: |
          pip install playwright==1.61.0
          playwright install chromium --with-deps
          DIVAN_SITE_URL=https://trugurpala.github.io/divan/ python tests/site_testi.py
      - name: Sürüm notunu üret ve etiketi/Release sayfasını eşitle
        id: release-assets
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          tag="v${version}"
          notes="$RUNNER_TEMP/divan-release-notes.md"
          archive="$RUNNER_TEMP/divan-${tag}.zip"
          checksum="$RUNNER_TEMP/divan-${tag}.sha256"
          sbom="$RUNNER_TEMP/divan-${tag}.spdx.json"
          runner="$RUNNER_TEMP/divan-project.pyz"
          runner_checksum="$RUNNER_TEMP/divan-project.pyz.sha256"
          python scripts/release.py --notes "$notes"
          source_commit="$GITHUB_SHA"
          if git rev-parse "$tag^{commit}" >/dev/null 2>&1; then
            tagged_commit="$(git rev-parse "$tag^{commit}")"
            test "$tagged_commit" = "$source_commit" || {
              echo "HATA: $tag etiketi $tagged_commit commit'inde; $source_commit uzerine tasinmayacak." >&2
              exit 1
            }
          fi
          git archive --format=zip --prefix="divan-${tag}/" --output="$archive" "$source_commit"
          python scripts/build_project_runner.py --output "$runner" --source-commit "$source_commit"
          runner_sha256="$(sha256sum "$runner" | awk '{print $1}')"
          printf '%s  %s\n' "$runner_sha256" "$(basename "$runner")" > "$runner_checksum"
          runner_checksum_sha256="$(sha256sum "$runner_checksum" | awk '{print $1}')"
          python scripts/sbom.py --output "$sbom" --source-commit "$source_commit" \
            --artifact "$(basename "$runner")=$runner_sha256" \
            --artifact "$(basename "$runner_checksum")=$runner_checksum_sha256"
          archive_sha256="$(sha256sum "$archive" | awk '{print $1}')"
          sbom_sha256="$(sha256sum "$sbom" | awk '{print $1}')"
          printf '%s  %s\n%s  %s\n%s  %s\n%s  %s\nsource_commit=%s\ntag=%s\n' "$archive_sha256" "$(basename "$archive")" "$sbom_sha256" "$(basename "$sbom")" "$runner_sha256" "$(basename "$runner")" "$runner_checksum_sha256" "$(basename "$runner_checksum")" "$source_commit" "$tag" > "$checksum"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          echo "runner=$runner" >> "$GITHUB_OUTPUT"
          echo "runner_checksum=$runner_checksum" >> "$GITHUB_OUTPUT"
          echo "sbom=$sbom" >> "$GITHUB_OUTPUT"
          echo "source_commit=$source_commit" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Attest every release asset before publication
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.release-assets.outputs.archive }}
            ${{ steps.release-assets.outputs.sbom }}
            ${{ steps.release-assets.outputs.runner }}
            ${{ steps.release-assets.outputs.runner_checksum }}
            ${{ steps.release-assets.outputs.checksum }}
      - name: Publish or verify immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ARCHIVE: ${{ steps.release-assets.outputs.archive }}
          RELEASE_CHECKSUM: ${{ steps.release-assets.outputs.checksum }}
          RELEASE_NOTES: ${{ steps.release-assets.outputs.notes }}
          RELEASE_RUNNER: ${{ steps.release-assets.outputs.runner }}
          RELEASE_RUNNER_CHECKSUM: ${{ steps.release-assets.outputs.runner_checksum }}
          RELEASE_SBOM: ${{ steps.release-assets.outputs.sbom }}
          RELEASE_SOURCE_COMMIT: ${{ steps.release-assets.outputs.source_commit }}
          RELEASE_TAG: ${{ steps.release-assets.outputs.tag }}
        run: |
          set -euo pipefail
          archive="$RELEASE_ARCHIVE"
          checksum="$RELEASE_CHECKSUM"
          notes="$RELEASE_NOTES"
          runner="$RELEASE_RUNNER"
          runner_checksum="$RELEASE_RUNNER_CHECKSUM"
          sbom="$RELEASE_SBOM"
          source_commit="$RELEASE_SOURCE_COMMIT"
          tag="$RELEASE_TAG"
          if git rev-parse "$tag^{commit}" >/dev/null 2>&1; then
            if gh release view "$tag" >/dev/null 2>&1; then
              existing="$RUNNER_TEMP/existing-$tag"
              mkdir -p "$existing"
              gh release download "$tag" --pattern "$(basename "$archive")" --dir "$existing"
              gh release download "$tag" --pattern "$(basename "$checksum")" --dir "$existing"
              gh release download "$tag" --pattern "$(basename "$sbom")" --dir "$existing"
              gh release download "$tag" --pattern "$(basename "$runner")" --dir "$existing"
              gh release download "$tag" --pattern "$(basename "$runner_checksum")" --dir "$existing"
              cmp --silent "$archive" "$existing/$(basename "$archive")"
              cmp --silent "$checksum" "$existing/$(basename "$checksum")"
              cmp --silent "$sbom" "$existing/$(basename "$sbom")"
              cmp --silent "$runner" "$existing/$(basename "$runner")"
              cmp --silent "$runner_checksum" "$existing/$(basename "$runner_checksum")"
              echo "$tag Release varliklari byte-byte dogrulandi; hicbir varlik degistirilmedi."
            else
              gh release create "$tag" "$archive" "$checksum" "$sbom" "$runner" "$runner_checksum" --verify-tag --title "Divan $tag" --notes-file "$notes"
            fi
          else
            test "$source_commit" = "$GITHUB_SHA"
            gh release create "$tag" "$archive" "$checksum" "$sbom" "$runner" "$runner_checksum" --target "$source_commit" --title "Divan $tag" --notes-file "$notes"
          fi
