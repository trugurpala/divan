name: uyumluluk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/kur-codex.*'
      - 'scripts/kaldir-codex.*'
      - 'scripts/kur-hostlar.py'
      - '.claude-plugin/**'
      - '.agents/**'
      - '.github/workflows/uyumluluk.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'scripts/kur-codex.*'
      - 'scripts/kaldir-codex.*'
      - 'scripts/kur-hostlar.py'
      - '.claude-plugin/**'
      - '.agents/**'
      - '.github/workflows/uyumluluk.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-code:
    name: Claude Code / temiz doğrulayıcı
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Claude/Codex pazar eşliği ve işlemsel kurucu sözleşmesi
        run: |
          python scripts/host_marketplaces.py --check
          python -m unittest tests.test_host_marketplaces tests.test_host_install -v
      - name: Marketplace ve beş paketi resmî CLI ile doğrula
        run: |
          npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate . --strict
          for plugin in plugins/*; do npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate "$plugin" --strict; done

  codex:
    name: Codex / ${{ matrix.os }} temiz kur-kaldır
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Unix temiz kurulum, keşif ve kaldırma
        if: runner.os != 'Windows'
        env:
          DIVAN_SOURCE_DIR: ${{ github.workspace }}
          CODEX_SKILLS_DIR: ${{ runner.temp }}/codex-skills
          DIVAN_STATE_DIR: ${{ runner.temp }}/codex-state
        run: |
          bash scripts/kur-codex.sh
          test "$(find "$CODEX_SKILLS_DIR" -type f -name SKILL.md | wc -l)" -eq 41
          bash scripts/kaldir-codex.sh
          test "$(find "$CODEX_SKILLS_DIR" -type f -name SKILL.md | wc -l)" -eq 0
      - name: Windows temiz kurulum, keşif ve kaldırma
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DIVAN_SOURCE_DIR: ${{ github.workspace }}
          CODEX_SKILLS_DIR: ${{ runner.temp }}\codex-skills
          DIVAN_STATE_DIR: ${{ runner.temp }}\codex-state
        run: |
          & ./scripts/kur-codex.ps1
          $count = @(Get-ChildItem $env:CODEX_SKILLS_DIR -Filter SKILL.md -Recurse).Count
          if ($count -ne 41) { throw "Beklenen 41 skill, bulunan $count" }
          & ./scripts/kaldir-codex.ps1
          $remaining = @(Get-ChildItem $env:CODEX_SKILLS_DIR -Filter SKILL.md -Recurse).Count
          if ($remaining -ne 0) { throw "Kaldirma sonrasi $remaining skill kaldi" }

  native-hosts:
    name: Claude + Codex native / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Sabitlenmiş resmî host CLI'larını kur
        run: npm install --global @anthropic-ai/claude-code@2.1.215 @openai/codex@0.144.6
      - name: Temiz profilde iki native pazarı kur, doğrula ve geri al
        shell: bash
        env:
          DIVAN_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          DIVAN_PROFILE: ${{ runner.temp }}/divan-native-profile
          DIVAN_TRANSACTION_DIR: ${{ runner.temp }}/divan-native-transactions
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          profile = pathlib.Path(os.environ["DIVAN_PROFILE"])
          state = pathlib.Path(os.environ["DIVAN_TRANSACTION_DIR"])
          profile.mkdir(parents=True, exist_ok=True)
          environment = os.environ.copy()
          environment.update(
              {
                  "HOME": str(profile),
                  "USERPROFILE": str(profile),
                  "CLAUDE_CONFIG_DIR": str(profile / ".claude"),
                  "CODEX_HOME": str(profile / ".codex"),
              }
          )
          pathlib.Path(environment["CLAUDE_CONFIG_DIR"]).mkdir(parents=True, exist_ok=True)
          pathlib.Path(environment["CODEX_HOME"]).mkdir(parents=True, exist_ok=True)
          install = [
              sys.executable,
              "scripts/kur-hostlar.py",
              "--host", "both",
              "--source", os.getcwd(),
              "--ref", os.environ["DIVAN_REF"],
              "--execute",
              "--state-dir", str(state),
          ]
          subprocess.run(install, check=True, env=environment)
          transaction = next(state.glob("install-*.json"))

          def installed(host: str) -> set[str]:
              output = subprocess.check_output(
                  [host, "plugin", "list", "--json"], env=environment, text=True
              )
              value = json.loads(output)
              rows = value if host == "claude" else value["installed"]
              key = "id" if host == "claude" else "pluginId"
              return {row[key] for row in rows}

          expected = {
              "sadrazam@divan", "core-pack@divan", "ui-pack@divan",
              "react-pack@divan", "zanaat-pack@divan",
          }
          record = json.loads(transaction.read_text(encoding="utf-8"))
          if record.get("status") != "verified":
              raise SystemExit("native install transaction was not verified")
          for host in ("claude", "codex"):
              if not expected.issubset(installed(host)):
                  raise SystemExit(f"{host}: five native Divan packages were not installed")
              evidence = record.get("verified", {}).get(host, {})
              if evidence.get("package_count") != 5 or evidence.get("skill_count") != 41:
                  raise SystemExit(f"{host}: native package/skill evidence is incomplete")
              if evidence.get("ref") != os.environ["DIVAN_REF"]:
                  raise SystemExit(f"{host}: verified ref does not match CI commit")
              if evidence.get("all_enabled") is not True:
                  raise SystemExit(f"{host}: one or more native packages are disabled")

          subprocess.run(
              [sys.executable, "scripts/kur-hostlar.py", "--rollback-transaction", str(transaction)],
              check=True,
              env=environment,
          )
          for host in ("claude", "codex"):
              if installed(host) & expected:
                  raise SystemExit(f"{host}: native rollback left Divan packages behind")
          PY
