name: teftis
on: [push, pull_request]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Yerel testler
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
          python scripts/validate.py
          python evals/run.py --check
          python scripts/wiki.py --check
          python scripts/meclis.py --check
          python scripts/katalog.py --check
          python scripts/v1.py --check
          python scripts/yayin.py --check
      - name: Agent Skills resmi dogrulayici
        run: |
          pip install skills-ref==0.1.1
          for skill in plugins/*/skills/*; do agentskills validate "$skill"; done
      - name: Claude Code resmi dogrulayici
        run: |
          npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate . --strict
          for plugin in plugins/*; do npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate "$plugin" --strict; done
