name: site-testi
on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/**'
      - 'site/**'
      - 'tests/site_testi.py'
      - 'tests/test_site_markup.py'
      - '.github/workflows/site-testi.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'site/**'
      - 'tests/site_testi.py'
      - 'tests/test_site_markup.py'
      - '.github/workflows/site-testi.yml'
  schedule:
    - cron: '0 6 * * 1'  # her pazartesi 06:00 UTC
permissions:
  contents: read
jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - run: pip install playwright==1.61.0 && playwright install chromium --with-deps
      - name: PR/push içeriğini yerel sunucuda test et
        run: |
          python -m http.server 8000 --directory docs >/tmp/divan-site.log 2>&1 &
          python - <<'PY'
          import time, urllib.request
          for _ in range(20):
              try:
                  urllib.request.urlopen("http://127.0.0.1:8000/", timeout=1)
                  break
              except OSError:
                  time.sleep(0.25)
          else:
              raise SystemExit("yerel site baslamadi")
          PY
          DIVAN_SITE_URL=http://127.0.0.1:8000/ python tests/site_testi.py
      - name: Main ve zamanlanmış canlı nöbet
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          python - <<'PY'
          import pathlib, time, urllib.request
          version = pathlib.Path("VERSION").read_text().strip()
          url = "https://trugurpala.github.io/divan/"
          for _ in range(24):
              try:
                  html = urllib.request.urlopen(url, timeout=10).read().decode("utf-8")
                  if f"v{version}" in html and "Fermanını seç" in html:
                      break
              except OSError:
                  pass
              time.sleep(10)
          else:
              raise SystemExit(f"GitHub Pages v{version} zamaninda guncellenmedi")
          PY
          DIVAN_SITE_URL=https://trugurpala.github.io/divan/ python tests/site_testi.py
