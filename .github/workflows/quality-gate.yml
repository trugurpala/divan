name: quality-gate
on: [push, pull_request]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - name: Local quality gates
        run: |
          pip install -r requirements-dev.txt
          python scripts/hygiene.py --check
          python scripts/naming.py --check
          python scripts/divan.py company-validate
          python scripts/standards.py --check
          python -m unittest discover -s tests -p 'test_*.py'
          python scripts/validate.py
          python evals/run.py --check
          python scripts/wiki.py --check
          python scripts/candidate_review.py --check
          python scripts/catalog.py --check
          python scripts/v1.py --check
          python scripts/release.py --check
          python scripts/build_project_runner.py --output "$RUNNER_TEMP/divan-project-a.pyz" --source-commit "${{ github.sha }}"
          python scripts/build_project_runner.py --output "$RUNNER_TEMP/divan-project-b.pyz" --source-commit "${{ github.sha }}"
          cmp "$RUNNER_TEMP/divan-project-a.pyz" "$RUNNER_TEMP/divan-project-b.pyz"
          python "$RUNNER_TEMP/divan-project-a.pyz" validate --json
          ruff check .
          python scripts/clean_code.py --check
          mypy scripts evals plugins/sadrazam/company
          coverage run -m unittest discover -s tests
          coverage report --fail-under=64
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.10
          "$(go env GOPATH)/bin/actionlint"
      - name: Agent Skills resmi dogrulayici
        run: |
          pip install skills-ref==0.1.1
          for skill in plugins/*/skills/*; do agentskills validate "$skill"; done
      - name: Claude Code resmi dogrulayici
        run: |
          npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate . --strict
          for plugin in plugins/*; do npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate "$plugin" --strict; done
