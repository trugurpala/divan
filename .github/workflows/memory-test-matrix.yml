name: memory-test-matrix
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - test_wiki
          - test_meclis
          - test_devral
          - test_katalog
          - test_v1
          - test_naming
          - test_divan_cli
          - test_site_markup
          - test_upstream
          - test_hijyen
          - test_host_marketplaces
          - test_company_engine
          - test_validate
          - test_community
          - test_sbom
          - test_workflows
          - test_host_upgrade_locking
          - test_clean_code
          - test_yayin
          - test_standards
          - test_real_adapters
          - test_legacy_state
          - test_host_doctor
          - test_eval_runner
          - test_host_upgrade
          - test_host_install
          - test_host_upgrade_security
          - test_host_upgrade_authority
          - test_project_memory
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: python -m unittest tests.${{ matrix.module }} -v
