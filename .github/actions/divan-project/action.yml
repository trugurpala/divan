name: Divan Project OS
description: Build and run the portable, read-only Project OS verifier
inputs:
  project:
    description: Project path relative to the checked-out workspace
    required: false
    default: .
runs:
  using: composite
  steps:
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'
    - name: Verify project contract
      shell: bash
      env:
        DIVAN_PROJECT_INPUT: ${{ inputs.project }}
      run: python "$GITHUB_ACTION_PATH/../../../plugins/sadrazam/company/cli.py" verify --project "$DIVAN_PROJECT_INPUT" --json
